version: '3.8'

x-function: &python
  volumes:
    - ./app:/app:rw
    - poetry-volume:/opt/poetry:delegated
  user: "${USER_ID}"
  environment: &env-vars
    POETRY_HOME: /opt/poetry
  networks:
    - internal
  depends_on:
    - app_db
  env_file:
    .env

services:

  app_db:
    container_name: ${PROJECT_SLUG}_db
    image: postgres:11
    volumes:
      - app_db-template:/var/lib/postgresql/data/pgdata:rw
    env_file:
      - .env
    networks:
      - internal
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata

  app:
    <<: *python
    container_name: ${PROJECT_SLUG}_app
    build:
      context: .
      dockerfile: backend.dockerfile
    command: >
      python app/main.py
    env_file:
      - .env

  telegram-server:
    image: aiogram/telegram-bot-api:latest
    container_name: ${PROJECT_SLUG}_telegram-server
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_APP_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_APP_API_HASH}
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - ${TELEGRAM_SERVER_PORT}:${TELEGRAM_SERVER_PORT}
    networks:
      - internal
    depends_on:
      - app
    env_file:
      - .env

volumes:
  app_db-template:
  poetry-volume:
  telegram-bot-api-data:

networks:
  internal: